<title>Teža &amp; Pas</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#0d1117;color:#e6edf3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100%}
input,button,select{font-family:inherit;-webkit-appearance:none;appearance:none;border-radius:0}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
#wrap{max-width:500px;margin:0 auto;padding:12px 14px calc(env(safe-area-inset-bottom,0px) + 60px)}

.qbar{position:sticky;top:0;z-index:10;background:#0d1117;border-bottom:1px solid #30363d;padding:10px 14px;margin:-12px -14px 14px;display:flex;gap:8px}
.qbar input{flex:1;min-width:0;background:#161b22;border:1px solid #30363d;border-radius:8px;color:#e6edf3;font-size:16px;padding:9px 11px;outline:none}
.qbar button{background:#00C9A7;color:#000;border:none;border-radius:8px;padding:9px 14px;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;min-width:70px}

.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.hdr h1{font-size:20px;font-weight:700;letter-spacing:-0.02em}
.hdr h1 span{color:#00C9A7}
.streak{background:#161b22;border:1px solid #30363d;border-radius:20px;padding:5px 11px;font-size:12px;font-weight:600;color:#FFC400}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.scard{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:12px 13px}
.slbl{font-size:11px;color:#8b949e;margin-bottom:4px}
.sval{font-size:22px;font-family:ui-monospace,monospace;font-weight:500}
.sdelta{font-size:11px;font-family:ui-monospace,monospace;margin-top:3px}

.card{background:#161b22;border:1px solid #30363d;border-radius:12px;margin-bottom:12px;overflow:hidden}
.card-plain{background:#161b22;border:1px solid #30363d;border-radius:12px;margin-bottom:12px;padding:14px}

/* accordion — button is the trigger */
.acc-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:14px 16px;background:none;border:none;color:#8b949e;font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;text-align:left;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.acc-btn .chev{font-size:10px;display:inline-block;transition:transform 0.2s}
.acc-btn.open .chev{transform:rotate(180deg)}
.acc-body{padding:0 16px 14px;display:none}
.acc-body.open{display:block}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field{display:flex;flex-direction:column;gap:5px}
.lbl{font-size:11px;color:#8b949e;text-transform:uppercase;letter-spacing:0.06em}
.inp{background:#0d1117;border:1px solid #30363d;border-radius:8px;color:#e6edf3;font-size:16px;padding:9px 11px;outline:none;width:100%}
.inp:focus{border-color:#00C9A7}
.inp[readonly]{color:#8b949e}
.full{grid-column:1/-1}
.save-btn{width:100%;background:#00C9A7;color:#000;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px}

.tabs{display:flex;gap:6px;margin-bottom:12px}
.tab-btn{background:none;border:1px solid #30363d;border-radius:7px;color:#8b949e;font-size:12px;padding:6px 14px;cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.tab-btn.active{background:#00C9A7;color:#000;border-color:#00C9A7}

.goal-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.glbl{font-size:11px;color:#8b949e;margin-bottom:5px}
.pbar-bg{height:7px;background:#0d1117;border-radius:4px;overflow:hidden;border:1px solid #30363d;margin:6px 0}
.pbar{height:100%;border-radius:4px;transition:width 0.4s}
.ginfo{display:flex;justify-content:space-between;font-size:11px;color:#8b949e;font-family:ui-monospace,monospace}

.wgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.witem{background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:10px 12px}
.wlbl{font-size:11px;color:#8b949e;margin-bottom:3px}
.wval{font-size:15px;font-family:ui-monospace,monospace;font-weight:500}

.tbwrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:4px 8px;font-size:10px;color:#8b949e;text-transform:uppercase;border-bottom:1px solid #30363d}
td{padding:8px;font-family:ui-monospace,monospace;border-bottom:1px solid rgba(48,54,61,0.5)}
.del-btn{background:none;border:1px solid rgba(255,107,107,0.3);color:#FF6B6B;border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:12px}

.bkp-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.bkp-btn{background:#0d1117;color:#e6edf3;border:1px solid #30363d;border-radius:8px;padding:9px 13px;font-size:13px;font-weight:600;cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.bkp-btn.danger{color:#FF6B6B;border-color:rgba(255,107,107,0.3)}

.rem-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.time-inp{background:#0d1117;border:1px solid #30363d;border-radius:8px;color:#e6edf3;font-size:16px;padding:8px 11px;outline:none;font-family:ui-monospace,monospace}
.tog-btn{border:1px solid #30363d;border-radius:20px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);border-radius:30px;padding:10px 20px;font-size:13px;font-weight:700;z-index:999;pointer-events:none;white-space:nowrap;opacity:0;transition:opacity 0.25s}
.toast.show{opacity:1}
.empty{text-align:center;padding:30px;color:#8b949e;font-size:14px}
.note-td{color:#8b949e;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:11px;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
</style>
</head>
<body>
<div id="wrap">
  <div class="qbar">
    <input type="number" id="qw" placeholder="Teža (kg)" step="0.1" inputmode="decimal"/>
    <input type="number" id="qwa" placeholder="Pas (cm)" step="0.5" inputmode="decimal" style="max-width:100px"/>
    <button onclick="quickSave()">+ Vnesi</button>
  </div>

  <div class="hdr">
    <h1>Teža <span>&amp;</span> Pas</h1>
    <div class="streak" id="streakEl">🔥 0 dni</div>
  </div>

  <div class="grid2" id="statsEl"></div>

  <!-- Goals -->
  <div class="card">
    <button class="acc-btn" onclick="toggle('goals')">
      <span>Cilji &amp; napredek</span><span class="chev">▼</span>
    </button>
    <div class="acc-body" id="body-goals">
      <div class="goal-grid">
        <div>
          <div class="glbl">Ciljna teža (kg)</div>
          <input class="inp" type="number" id="goalW" placeholder="npr. 75" step="0.5" inputmode="decimal" oninput="saveGoals()"/>
          <div class="pbar-bg"><div class="pbar" id="pbarW" style="background:#00C9A7;width:0%"></div></div>
          <div class="ginfo"><span id="gleftW">—</span><span id="gpctW">—</span></div>
        </div>
        <div>
          <div class="glbl">Ciljni pas (cm)</div>
          <input class="inp" type="number" id="goalWa" placeholder="npr. 80" step="0.5" inputmode="decimal" oninput="saveGoals()"/>
          <div class="pbar-bg"><div class="pbar" id="pbarWa" style="background:#4A9EFF;width:0%"></div></div>
          <div class="ginfo"><span id="gleftWa">—</span><span id="gpctWa">—</span></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Chart -->
  <div class="card-plain">
    <div style="font-size:11px;color:#8b949e;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:10px">Gibanje skozi čas</div>
    <div class="tabs">
      <button class="tab-btn active" id="tab-weight" onclick="setChart('weight')">Teža</button>
      <button class="tab-btn" id="tab-waist" onclick="setChart('waist')">Pas</button>
      <button class="tab-btn" id="tab-both" onclick="setChart('both')">Oboje</button>
    </div>
    <div style="height:210px;position:relative"><canvas id="mainChart"></canvas></div>
  </div>

  <!-- Weekly -->
  <div class="card">
    <button class="acc-btn" onclick="toggle('weekly')">
      <span>Tedenski povzetek</span><span class="chev">▼</span>
    </button>
    <div class="acc-body" id="body-weekly">
      <div class="wgrid" id="weeklyEl"></div>
    </div>
  </div>

  <!-- Form -->
  <div class="card">
    <button class="acc-btn" onclick="toggle('form')">
      <span>Podroben vnos</span><span class="chev">▼</span>
    </button>
    <div class="acc-body" id="body-form">
      <div class="form-grid">
        <div class="field">
          <div class="lbl">Datum in ura</div>
          <input class="inp" type="text" id="fdt" readonly/>
        </div>
        <div class="field">
          <div class="lbl">Teža (kg)</div>
          <input class="inp" type="number" id="fw" placeholder="78.5" step="0.1" inputmode="decimal" onfocus="refreshDt()"/>
        </div>
        <div class="field">
          <div class="lbl">Pas (cm)</div>
          <input class="inp" type="number" id="fwa" placeholder="85" step="0.5" inputmode="decimal"/>
        </div>
        <div class="field">
          <div class="lbl">Višina (cm)</div>
          <input class="inp" type="number" id="fh" placeholder="178" step="1" inputmode="decimal"/>
        </div>
        <div class="field full">
          <div class="lbl">Opomba</div>
          <input class="inp" type="text" id="fnote" placeholder="npr. zjutraj, po treningu…"/>
        </div>
        <div class="full"><button class="save-btn" onclick="detailSave()">Shrani meritev</button></div>
      </div>
    </div>
  </div>

  <!-- Reminder -->
  <div class="card">
    <button class="acc-btn" onclick="toggle('reminder')">
      <span>Dnevni opomnik</span><span class="chev">▼</span>
    </button>
    <div class="acc-body" id="body-reminder">
      <div class="rem-row">
        <input class="time-inp" type="time" id="remTime" value="07:00" onchange="saveReminder()"/>
        <button class="tog-btn" id="remToggle" onclick="toggleReminder()">Izklop</button>
      </div>
      <div style="font-size:12px;color:#8b949e;margin-top:8px" id="remStatus"></div>
    </div>
  </div>

  <!-- Backup -->
  <div class="card">
    <button class="acc-btn" onclick="toggle('backup')">
      <span>Varnostna kopija</span><span class="chev">▼</span>
    </button>
    <div class="acc-body" id="body-backup">
      <div style="font-size:12px;color:#8b949e;margin-bottom:10px;line-height:1.5">⚠️ Safari lahko izbriše podatke. Priporočamo reden JSON izvoz.</div>
      <div class="bkp-row">
        <button class="bkp-btn" onclick="exportJSON()">Izvoz JSON</button>
        <button class="bkp-btn" onclick="exportCSV()">Izvoz CSV</button>
        <button class="bkp-btn" onclick="document.getElementById('fileInp').click()">Uvoz JSON</button>
        <button class="bkp-btn danger" onclick="clearAll()">Izbriši vse</button>
      </div>
      <input type="file" id="fileInp" accept=".json" style="display:none" onchange="importJSON(this)"/>
    </div>
  </div>

  <!-- History -->
  <div class="card">
    <div style="padding:14px 16px 0;font-size:11px;color:#8b949e;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px">Zgodovina</div>
    <div class="tbwrap" id="histEl"><div class="empty">Začni z vnosom zgoraj</div></div>
  </div>
</div>

<div class="toast" id="toastEl"></div>

<script>
// ── storage ──────────────────────────────────────────────────────
const K = {recs:'h_recs3', h:'h_height2', goals:'h_goals2', rem:'h_rem2'};
function lg(k,d){ try{const v=localStorage.getItem(k);return v!=null?JSON.parse(v):d;}catch{return d;} }
function ls(k,v){ try{localStorage.setItem(k,JSON.stringify(v));}catch{} }

let recs    = lg(K.recs, []);
let height  = lg(K.h, '');
let goals   = lg(K.goals, {w:'', wa:''});
let reminder= lg(K.rem, {time:'07:00', on:false});
let chartMode = 'weight';
let chartInst = null;
const openSections = {goals:false, weekly:false, form:false, reminder:false, backup:false};

// ── utils ─────────────────────────────────────────────────────────
function pad(n){ return String(n).padStart(2,'0'); }
function fmtNow(){
  const d=new Date();
  return `${d.getDate()}.${pad(d.getMonth()+1)}.${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function bmi(w,h){ if(!w||!h) return null; return (w/((h/100)**2)).toFixed(1); }
function bmiC(b){ b=parseFloat(b); if(b<18.5)return{l:'Prenizka',c:'#4A9EFF'}; if(b<25)return{l:'Normalna',c:'#00C9A7'}; if(b<30)return{l:'Prekomerna',c:'#FFC400'}; return{l:'Debelost',c:'#FF6B6B'}; }
function streak(){
  if(!recs.length) return 0;
  const days=[...new Set(recs.map(r=>r.iso.slice(0,10)))].sort().reverse();
  const today=new Date().toISOString().slice(0,10);
  const yest=new Date(Date.now()-864e5).toISOString().slice(0,10);
  if(days[0]!==today && days[0]!==yest) return 0;
  let s=0; let cur=new Date(days[0]);
  for(const d of days){
    if(d===cur.toISOString().slice(0,10)){s++;cur=new Date(+cur-864e5);}else break;
  }
  return s;
}

// ── toast ─────────────────────────────────────────────────────────
let toastT=null;
function toast(msg,err=false){
  const el=document.getElementById('toastEl');
  el.textContent=msg;
  el.style.background=err?'#FF6B6B':'#00C9A7';
  el.style.color=err?'#fff':'#000';
  el.classList.add('show');
  if(toastT) clearTimeout(toastT);
  toastT=setTimeout(()=>el.classList.remove('show'),2400);
}

// ── accordion ────────────────────────────────────────────────────
function toggle(key){
  openSections[key]=!openSections[key];
  const btn=document.querySelector(`[onclick="toggle('${key}')"]`);
  const body=document.getElementById('body-'+key);
  if(btn) btn.classList.toggle('open', openSections[key]);
  if(body) body.classList.toggle('open', openSections[key]);
}

// ── datetime ─────────────────────────────────────────────────────
function refreshDt(){ const el=document.getElementById('fdt'); if(el) el.value=fmtNow(); }
refreshDt();
setInterval(()=>{
  const el=document.getElementById('fdt');
  if(el && document.activeElement!==el) el.value=fmtNow();
}, 30000);

// ── quick save ───────────────────────────────────────────────────
function quickSave(){
  const w=parseFloat(document.getElementById('qw').value)||null;
  const wa=parseFloat(document.getElementById('qwa').value)||null;
  if(!w&&!wa){toast('Vnesi vsaj težo!',true);return;}
  recs.unshift({id:Date.now(),dt:fmtNow(),iso:new Date().toISOString(),w,wa,h:parseFloat(height)||null,note:''});
  ls(K.recs,recs);
  document.getElementById('qw').value='';
  document.getElementById('qwa').value='';
  render(); toast('Meritev shranjena');
}

// ── detail save ──────────────────────────────────────────────────
function detailSave(){
  const w=parseFloat(document.getElementById('fw').value)||null;
  const wa=parseFloat(document.getElementById('fwa').value)||null;
  if(!w&&!wa){toast('Vnesi vsaj težo ali pas!',true);return;}
  const fh=parseFloat(document.getElementById('fh').value)||null;
  if(fh){height=String(fh);ls(K.h,height);}
  const note=document.getElementById('fnote').value.trim();
  recs.unshift({id:Date.now(),dt:document.getElementById('fdt').value,iso:new Date().toISOString(),w,wa,h:fh||parseFloat(height)||null,note});
  ls(K.recs,recs);
  document.getElementById('fw').value='';
  document.getElementById('fwa').value='';
  document.getElementById('fnote').value='';
  render(); toast('Meritev shranjena');
}

// ── delete ───────────────────────────────────────────────────────
function delRec(id){
  if(!confirm('Izbriši to meritev?')) return;
  recs=recs.filter(r=>r.id!==id);
  ls(K.recs,recs); render(); toast('Izbrisano');
}

// ── goals ────────────────────────────────────────────────────────
function saveGoals(){
  goals.w  = document.getElementById('goalW').value;
  goals.wa = document.getElementById('goalWa').value;
  ls(K.goals,goals); renderGoals();
}

function renderGoals(){
  const wRecs=recs.filter(r=>r.w!=null), waRecs=recs.filter(r=>r.wa!=null);
  function upd(cur,goal,startVal,pbarId,leftId,pctId){
    const g=parseFloat(goal), c=parseFloat(cur), st=parseFloat(startVal);
    if(!g||!c){document.getElementById(pbarId).style.width='0%';document.getElementById(leftId).textContent='—';document.getElementById(pctId).textContent='—';return;}
    const total=Math.abs((isNaN(st)?c:st)-g);
    const done=Math.abs(c-g);
    const pct=total>0?Math.max(0,Math.min(100,Math.round((1-done/total)*100))):100;
    document.getElementById(pbarId).style.width=pct+'%';
    document.getElementById(leftId).textContent=done<0.05?'Cilj!':'Še '+Math.abs((c-g).toFixed(1));
    document.getElementById(pctId).textContent=pct+'%';
  }
  upd(wRecs[0]?.w,  goals.w,  wRecs[wRecs.length-1]?.w,  'pbarW',  'gleftW',  'gpctW');
  upd(waRecs[0]?.wa,goals.wa, waRecs[waRecs.length-1]?.wa,'pbarWa','gleftWa','gpctWa');
}

// ── chart ────────────────────────────────────────────────────────
function setChart(mode){
  chartMode=mode;
  ['weight','waist','both'].forEach(m=>{
    const b=document.getElementById('tab-'+m);
    if(b) b.classList.toggle('active',m===mode);
  });
  drawChart();
}

function drawChart(){
  const canvas=document.getElementById('mainChart');
  if(!canvas) return;
  if(chartInst){chartInst.destroy();chartInst=null;}
  const sorted=[...recs].sort((a,b)=>new Date(a.iso)-new Date(b.iso));
  const labels=sorted.map(r=>r.dt.split(' ')[0]);
  const wData=sorted.map(r=>r.w);
  const waData=sorted.map(r=>r.wa);
  const base={borderWidth:2,pointRadius:3,tension:0.35,spanGaps:true};
  chartInst=new Chart(canvas.getContext('2d'),{
    type:'line',
    data:{labels,datasets:
      chartMode==='weight'?[{...base,label:'Teža (kg)',data:wData,borderColor:'#00C9A7',backgroundColor:'rgba(0,201,167,0.1)',fill:true}]:
      chartMode==='waist' ?[{...base,label:'Pas (cm)', data:waData,borderColor:'#4A9EFF',backgroundColor:'rgba(74,158,255,0.1)',fill:true}]:
      [{...base,label:'Teža (kg)',data:wData, borderColor:'#00C9A7',fill:false,yAxisID:'y'},
       {...base,label:'Pas (cm)', data:waData,borderColor:'#4A9EFF',fill:false,yAxisID:'y2'}]
    },
    options:{
      responsive:true,maintainAspectRatio:false,animation:false,
      plugins:{legend:{labels:{color:'#8b949e',boxWidth:10,font:{size:11}}},tooltip:{backgroundColor:'#161b22',borderColor:'#30363d',borderWidth:1,titleColor:'#8b949e',bodyColor:'#e6edf3'}},
      scales:{
        x:{grid:{color:'rgba(48,54,61,0.6)'},ticks:{color:'#8b949e',font:{size:9},maxRotation:30}},
        y:{grid:{color:'rgba(48,54,61,0.6)'},ticks:{color:'#8b949e',font:{size:10}}},
        y2:{display:chartMode==='both',grid:{drawOnChartArea:false},ticks:{color:'#8b949e',font:{size:10}}}
      }
    }
  });
}

// ── reminder ─────────────────────────────────────────────────────
function saveReminder(){
  reminder.time=document.getElementById('remTime').value;
  ls(K.rem,reminder); renderReminder();
}
async function toggleReminder(){
  if(!reminder.on){
    let p=Notification.permission;
    if(p==='default') p=await Notification.requestPermission();
    if(p!=='granted'){toast('Dovoljenje zavrnjeno',true);return;}
  }
  reminder.on=!reminder.on;
  ls(K.rem,reminder); renderReminder();
  toast(reminder.on?`Opomnik ob ${reminder.time}`:'Opomnik izklopljen');
}
function renderReminder(){
  const tog=document.getElementById('remToggle');
  const sta=document.getElementById('remStatus');
  if(!tog||!sta) return;
  if(reminder.on){tog.style.background='#00C9A7';tog.style.color='#000';tog.textContent='Vklopljeno';}
  else{tog.style.background='#161b22';tog.style.color='#e6edf3';tog.textContent='Izklop';}
  sta.textContent=reminder.on?`Aktiven ob ${reminder.time}`:'Izklopljen';
}
setInterval(()=>{
  if(!reminder.on||Notification.permission!=='granted') return;
  const now=new Date();
  const cur=`${pad(now.getHours())}:${pad(now.getMinutes())}`;
  if(cur!==reminder.time) return;
  const today=now.toISOString().slice(0,10);
  if(recs.some(r=>r.iso.slice(0,10)===today)) return;
  new Notification('Teža & Pas',{body:'Ne pozabi na današnjo meritev!'});
},60000);

// ── backup ───────────────────────────────────────────────────────
function exportJSON(){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify({records:recs,height,goals},null,2)],{type:'application/json'}));
  a.download=`teza-${new Date().toISOString().slice(0,10)}.json`;
  a.click(); toast('JSON izvožen');
}
function exportCSV(){
  const h2=parseFloat(height)||null;
  const rows=[['Datum','Teža','Pas','BMI','Opomba'],...recs.map(r=>[r.dt,r.w||'',r.wa||'',bmi(r.w,r.h||h2)||'',r.note||''])];
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
  a.download=`teza-${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); toast('CSV izvožen');
}
function importJSON(input){
  const f=input.files[0]; if(!f) return;
  const fr=new FileReader();
  fr.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(!Array.isArray(d.records)) throw 0;
      const ex=new Set(recs.map(r=>r.id));
      const nr=d.records.filter(r=>!ex.has(r.id));
      recs=[...recs,...nr].sort((a,b)=>new Date(b.iso)-new Date(a.iso));
      ls(K.recs,recs);
      if(d.height){height=String(d.height);ls(K.h,height);}
      render(); toast(`Uvoženih ${nr.length} meritev`);
    }catch{toast('Napaka pri uvozu',true);}
    input.value='';
  };
  fr.readAsText(f);
}
function clearAll(){
  if(!confirm('Izbrisati VSE meritve?')) return;
  if(!confirm('Potrdi: res vse?')) return;
  recs=[]; ls(K.recs,[]); render(); toast('Vse izbrisano');
}

// ── stats ────────────────────────────────────────────────────────
function renderStats(){
  const wR=recs.filter(r=>r.w!=null), waR=recs.filter(r=>r.wa!=null);
  const lw=wR[0]?.w, lwa=waR[0]?.wa;
  const h2=parseFloat(height)||null;
  const b=bmi(lw,h2);
  const s=streak();
  const now=Date.now(), weekMs=7*864e5;
  const tw=recs.filter(r=>now-new Date(r.iso)<weekMs).length;

  document.getElementById('streakEl').textContent=`🔥 ${s} ${s===1?'dan':s<5?'dni':'dni'}`;

  function sc(lbl,val,delta,color){
    const dn=parseFloat(delta);
    const dc=!delta?'#8b949e':dn>0?'#FF6B6B':'#00C9A7';
    return `<div class="scard">
      <div class="slbl">${lbl}</div>
      <div class="sval" style="color:${color||'#e6edf3'}">${val||'—'}</div>
      ${delta?`<div class="sdelta" style="color:${dc}">${dn>0?'+':''}${delta}</div>`:''}
    </div>`;
  }
  const wd=wR.length>1?((lw-wR[1].w).toFixed(1)+' kg'):null;
  const wad=waR.length>1?((lwa-waR[1].wa).toFixed(1)+' cm'):null;
  const bObj=b?bmiC(b):null;
  document.getElementById('statsEl').innerHTML=
    sc('Zadnja teža', lw?lw+' kg':null, wd, '#00C9A7')+
    sc('Zadnji pas',  lwa?lwa+' cm':null, wad, '#4A9EFF')+
    `<div class="scard"><div class="slbl">BMI</div>
      <div class="sval" style="color:${bObj?bObj.c:'#e6edf3'}">${b||'—'}</div>
      ${bObj?`<div style="font-size:11px;color:${bObj.c};margin-top:3px">${bObj.l}</div>`:''}</div>`+
    `<div class="scard"><div class="slbl">Skupaj</div>
      <div class="sval">${recs.length}</div>
      <div class="sdelta" style="color:#8b949e">${tw} ta teden</div></div>`;
}

// ── weekly ───────────────────────────────────────────────────────
function renderWeekly(){
  const now=Date.now(), wms=7*864e5;
  const tw=recs.filter(r=>now-new Date(r.iso)<wms);
  const pw=recs.filter(r=>{const a=now-new Date(r.iso);return a>=wms&&a<2*wms;});
  const avg=arr=>arr.length?(arr.reduce((s,v)=>s+v,0)/arr.length).toFixed(1):null;
  const twW=tw.filter(r=>r.w!=null).map(r=>r.w);
  const twWa=tw.filter(r=>r.wa!=null).map(r=>r.wa);
  const pwW=pw.filter(r=>r.w!=null).map(r=>r.w);
  const twAvg=avg(twW), pwAvg=avg(pwW);
  const diff=twAvg&&pwAvg?((parseFloat(twAvg)-parseFloat(pwAvg)).toFixed(1)+' kg'):null;
  const dc=diff?(parseFloat(diff)>0?'#FF6B6B':'#00C9A7'):'#e6edf3';
  function wi(l,v,c){ return `<div class="witem"><div class="wlbl">${l}</div><div class="wval" style="color:${c||'#e6edf3'}">${v||'—'}</div></div>`; }
  document.getElementById('weeklyEl').innerHTML=
    wi('Povp. teža', twAvg?twAvg+' kg':null)+
    wi('vs. prejšnji', diff, dc)+
    wi('Povp. pas', avg(twWa)?avg(twWa)+' cm':null)+
    wi('Min teža', twW.length?Math.min(...twW)+' kg':null)+
    wi('Max teža', twW.length?Math.max(...twW)+' kg':null)+
    wi('Meritev', String(tw.length));
}

// ── history ──────────────────────────────────────────────────────
function renderHistory(){
  const el=document.getElementById('histEl');
  if(!recs.length){el.innerHTML='<div class="empty">Začni z vnosom zgoraj</div>';return;}
  const h2=parseFloat(height)||null;
  let rows=recs.map(r=>{
    const b=bmi(r.w,r.h||h2);
    const bc=b?bmiC(b).c:'#8b949e';
    return `<tr>
      <td style="color:#8b949e;font-size:11px">${r.dt}</td>
      <td>${r.w!=null?r.w+' kg':'—'}</td>
      <td>${r.wa!=null?r.wa+' cm':'—'}</td>
      <td style="color:${bc}">${b||'—'}</td>
      <td class="note-td">${r.note||''}</td>
      <td><button class="del-btn" onclick="delRec(${r.id})">✕</button></td>
    </tr>`;
  }).join('');
  el.innerHTML=`<table><thead><tr><th>Datum</th><th>Teža</th><th>Pas</th><th>BMI</th><th>Opomba</th><th></th></tr></thead><tbody>${rows}</tbody></table>`;
}

// ── init inputs ──────────────────────────────────────────────────
function initInputs(){
  document.getElementById('goalW').value=goals.w||'';
  document.getElementById('goalWa').value=goals.wa||'';
  document.getElementById('fh').value=height||'';
  document.getElementById('remTime').value=reminder.time;
}

// ── master render ─────────────────────────────────────────────────
function render(){
  renderStats();
  renderGoals();
  renderWeekly();
  renderHistory();
  renderReminder();
  drawChart();
}

initInputs();
render();
</script>
</body>
</html>

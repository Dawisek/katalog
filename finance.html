<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Finance"/>
<meta name="theme-color" content="#0d1117"/>
<title>Finance</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#0d1117;color:#e6edf3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100%}
input,button{font-family:inherit;-webkit-appearance:none;appearance:none}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}

#wrap{max-width:500px;margin:0 auto;
  padding:calc(env(safe-area-inset-top,0px) + 14px) 14px calc(env(safe-area-inset-bottom,0px) + 50px)}

/* ── header ── */
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.hdr h1{font-size:22px;font-weight:700;letter-spacing:-0.02em}
.hdr h1 span{color:#3fb950}
.month-nav{display:flex;align-items:center;gap:10px}
.mnav-btn{background:#161b22;border:1px solid #30363d;border-radius:8px;
  width:32px;height:32px;color:#e6edf3;font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center}
.mnav-btn:active{background:#30363d}
.month-lbl{font-size:13px;font-weight:600;color:#8b949e;min-width:80px;text-align:center}

/* ── balance card ── */
.balance-card{background:#161b22;border:1px solid #30363d;border-radius:14px;
  padding:18px 16px;margin-bottom:14px}
.balance-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
.bal-item{text-align:center}
.bal-lbl{font-size:11px;color:#8b949e;margin-bottom:4px}
.bal-val{font-size:20px;font-family:ui-monospace,monospace;font-weight:700}
.bal-val.pos{color:#3fb950}
.bal-val.neg{color:#f85149}
.bal-val.neu{color:#e6edf3}

/* ── quick entry ── */
.quick-wrap{margin-bottom:14px}
.type-toggle{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.type-btn{border:2px solid #30363d;border-radius:12px;padding:14px;
  font-size:15px;font-weight:700;cursor:pointer;background:#161b22;
  color:#8b949e;transition:all .15s;text-align:center}
.type-btn.active-exp{background:rgba(248,81,73,.12);border-color:#f85149;color:#f85149}
.type-btn.active-inc{background:rgba(63,185,80,.12);border-color:#3fb950;color:#3fb950}

.amount-row{display:flex;gap:8px;margin-bottom:10px}
.amount-inp{flex:1;background:#161b22;border:2px solid #30363d;border-radius:10px;
  color:#e6edf3;font-size:24px;font-family:ui-monospace,monospace;font-weight:700;
  padding:12px 14px;outline:none;text-align:right}
.amount-inp:focus{border-color:#58a6ff}
.amount-inp::placeholder{color:#30363d}
.currency-lbl{display:flex;align-items:center;font-size:20px;color:#8b949e;
  font-family:ui-monospace,monospace;font-weight:700;padding:0 4px}

.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:10px}
.cat-chip{background:#161b22;border:1px solid #30363d;border-radius:10px;
  padding:8px 4px;font-size:11px;cursor:pointer;color:#8b949e;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:3px;line-height:1.2}
.cat-chip .ce{font-size:20px}
.cat-chip.sel{border-color:var(--cc);color:var(--cc);background:rgba(0,0,0,.2)}

.note-row{display:flex;gap:8px;margin-bottom:10px}
.note-inp{flex:1;background:#161b22;border:1px solid #30363d;border-radius:10px;
  color:#e6edf3;font-size:16px;padding:10px 13px;outline:none}
.note-inp:focus{border-color:#58a6ff}

.save-btn{width:100%;border:none;border-radius:12px;padding:14px;
  font-size:16px;font-weight:700;cursor:pointer;transition:opacity .15s}
.save-btn.exp{background:#f85149;color:#fff}
.save-btn.inc{background:#3fb950;color:#000}
.save-btn:active{opacity:.8}

/* ── chart ── */
.chart-card{background:#161b22;border:1px solid #30363d;border-radius:14px;
  padding:16px;margin-bottom:14px}
.card-title{font-size:11px;color:#8b949e;font-weight:600;letter-spacing:.1em;
  text-transform:uppercase;margin-bottom:12px}
.chart-wrap{height:200px;position:relative}

/* ── tabs ── */
.tabs{display:flex;gap:6px;margin-bottom:12px}
.tab-btn{background:none;border:1px solid #30363d;border-radius:7px;color:#8b949e;
  font-size:12px;padding:6px 14px;cursor:pointer}
.tab-btn.active{background:#58a6ff;color:#000;border-color:#58a6ff}

/* ── category breakdown ── */
.cat-breakdown{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.cat-row{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:11px 13px}
.cat-row-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.cat-row-left{display:flex;align-items:center;gap:8px}
.cat-row-emoji{font-size:18px}
.cat-row-name{font-size:13px;font-weight:600}
.cat-row-amt{font-size:14px;font-family:ui-monospace,monospace;font-weight:700}
.cat-bar-bg{height:5px;background:#0d1117;border-radius:3px;overflow:hidden}
.cat-bar{height:100%;border-radius:3px;transition:width .4s}
.cat-row-count{font-size:11px;color:#484f58;margin-top:3px}

/* ── transactions ── */
.tx-item{display:flex;align-items:center;gap:11px;background:#161b22;
  border:1px solid #30363d;border-radius:10px;padding:11px 12px;margin-bottom:7px}
.tx-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;
  justify-content:center;font-size:18px;flex-shrink:0}
.tx-body{flex:1;min-width:0}
.tx-name{font-size:14px;font-weight:500}
.tx-meta{font-size:11px;color:#8b949e;margin-top:2px}
.tx-amt{font-family:ui-monospace,monospace;font-size:15px;font-weight:700;
  flex-shrink:0;text-align:right}
.tx-del{background:none;border:none;color:#484f58;font-size:20px;
  cursor:pointer;padding:0 0 0 6px;line-height:1}
.tx-del:active{color:#f85149}
.tx-date-sep{font-size:11px;color:#484f58;font-weight:600;
  text-transform:uppercase;letter-spacing:.08em;padding:6px 0 4px}

/* ── budget ── */
.budget-card{background:#161b22;border:1px solid #30363d;border-radius:14px;
  padding:16px;margin-bottom:14px}
.budget-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.budget-lbl{font-size:13px;color:#8b949e;flex:1}
.budget-inp{width:100px;background:#0d1117;border:1px solid #30363d;border-radius:8px;
  color:#e6edf3;font-size:16px;padding:7px 10px;outline:none;text-align:right;
  font-family:ui-monospace,monospace}
.budget-inp:focus{border-color:#58a6ff}
.budget-bar-wrap{margin-top:8px}
.budget-bar-bg{height:8px;background:#0d1117;border-radius:4px;overflow:hidden;
  border:1px solid #30363d;margin-bottom:5px}
.budget-bar{height:100%;border-radius:4px;transition:width .4s}
.budget-info{display:flex;justify-content:space-between;font-size:11px;
  color:#8b949e;font-family:ui-monospace,monospace}

/* ── subcategory autocomplete ── */
.note-wrap{position:relative;flex:1}
.note-wrap input{width:100%}
.note-sugg{position:absolute;top:100%;left:0;right:0;background:#161b22;border:1px solid #30363d;
  border-radius:0 0 10px 10px;z-index:20;display:none;max-height:160px;overflow-y:auto}
.note-sugg.show{display:block}
.note-sugg-item{padding:10px 13px;font-size:14px;cursor:pointer;border-bottom:1px solid #21262d}
.note-sugg-item:last-child{border-bottom:none}
.note-sugg-item:active{background:#30363d}
.note-sugg-item span{font-size:11px;color:#8b949e;margin-left:6px}

/* ── subcat rows ── */
.subcat-list{margin-top:6px;padding-left:10px;border-left:2px solid #21262d;display:none}
.subcat-list.open{display:block}
.subcat-row{display:flex;align-items:center;justify-content:space-between;
  padding:5px 0;font-size:12px;color:#8b949e}
.subcat-row-name{display:flex;align-items:center;gap:6px}
.subcat-bar-bg{height:3px;background:#0d1117;border-radius:2px;overflow:hidden;margin-top:3px}
.subcat-bar{height:100%;border-radius:2px}
.expand-btn{background:none;border:none;color:#484f58;font-size:11px;cursor:pointer;
  padding:2px 6px;margin-top:4px}

/* ── accordion header ── */
.acc-hdr{display:flex;align-items:center;justify-content:space-between;width:100%;
  padding:14px 16px;background:none;border:none;color:#8b949e;font-size:11px;
  font-weight:600;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;
  text-align:left;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.acc-hdr span:last-child{font-size:10px;transition:transform .2s;display:inline-block}
.acc-hdr.open span:last-child{transform:rotate(180deg)}

/* ── recurring ── */
.rec-card{background:#161b22;border:1px solid #30363d;border-radius:14px;padding:16px;margin-bottom:14px}
.rec-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.rec-item{display:flex;align-items:center;gap:10px;background:#0d1117;border:1px solid #30363d;border-radius:10px;padding:10px 12px}
.rec-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.rec-body{flex:1;min-width:0}
.rec-name{font-size:14px;font-weight:500}
.rec-meta{font-size:11px;color:#8b949e;margin-top:2px}
.rec-amt{font-family:ui-monospace,monospace;font-size:14px;font-weight:700;color:#f85149;flex-shrink:0}
.rec-del{background:none;border:none;color:#484f58;font-size:20px;cursor:pointer;padding:0 0 0 6px;line-height:1}
.rec-del:active{color:#f85149}
.rec-add-row{display:grid;grid-template-columns:1fr 80px;gap:8px;margin-bottom:8px}
.rec-inp{background:#0d1117;border:1px solid #30363d;border-radius:8px;color:#e6edf3;font-size:16px;padding:9px 11px;outline:none;width:100%}
.rec-inp:focus{border-color:#f85149}
.rec-cat-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.rec-cat-chip{background:#0d1117;border:1px solid #30363d;border-radius:7px;padding:5px 10px;font-size:12px;cursor:pointer;color:#8b949e}
.rec-cat-chip.sel{border-color:#f85149;color:#f85149}
.rec-save-btn{width:100%;background:#f85149;color:#fff;border:none;border-radius:9px;padding:11px;font-size:14px;font-weight:700;cursor:pointer}
.rec-total{display:flex;justify-content:space-between;align-items:center;padding-top:10px;border-top:1px solid #30363d;margin-top:4px}
.rec-total-lbl{font-size:12px;color:#8b949e}
.rec-total-amt{font-size:16px;font-family:ui-monospace,monospace;font-weight:700;color:#f85149}
.rec-badge{display:inline-block;font-size:10px;background:rgba(248,81,73,.15);color:#f85149;border-radius:4px;padding:1px 5px;margin-left:5px;vertical-align:middle}

/* ── empty & toast ── */
.empty{text-align:center;padding:36px 20px;color:#484f58}
.empty-icon{font-size:2.5rem;margin-bottom:8px}
.empty p{font-size:14px;line-height:1.6}
.toast{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px)+24px);left:50%;
  transform:translateX(-50%);border-radius:30px;padding:10px 20px;font-size:13px;
  font-weight:700;z-index:999;pointer-events:none;white-space:nowrap;opacity:0;transition:opacity .25s}
.toast.show{opacity:1}
.toast.ok{background:#3fb950;color:#000}
.toast.err{background:#f85149;color:#fff}
.toast.info{background:#58a6ff;color:#000}
</style>
</head>
<body>
<div id="wrap">

  <!-- header -->
  <div class="hdr">
    <h1>Fi<span>nance</span></h1>
    <div class="month-nav">
      <button class="mnav-btn" onclick="changeMonth(-1)">‹</button>
      <div class="month-lbl" id="monthLbl"></div>
      <button class="mnav-btn" onclick="changeMonth(1)">›</button>
    </div>
  </div>

  <!-- balance -->
  <div class="balance-card">
    <div class="balance-row">
      <div class="bal-item">
        <div class="bal-lbl">Prihodki</div>
        <div class="bal-val pos" id="balInc">€0</div>
      </div>
      <div class="bal-item">
        <div class="bal-lbl">Stroški</div>
        <div class="bal-val neg" id="balExp">€0</div>
      </div>
      <div class="bal-item">
        <div class="bal-lbl">Bilanca</div>
        <div class="bal-val neu" id="balNet">€0</div>
      </div>
    </div>
    <!-- budget progress shown here -->
    <div id="budgetProgress"></div>
  </div>

  <!-- quick entry -->
  <div class="quick-wrap">
    <div class="type-toggle">
      <button class="type-btn active-exp" id="btnExp" onclick="setType('exp')">− Strošek</button>
      <button class="type-btn" id="btnInc" onclick="setType('inc')">+ Prihodek</button>
    </div>

    <div class="amount-row">
      <div class="currency-lbl">€</div>
      <input type="number" id="amountInp" class="amount-inp" placeholder="0.00"
        step="0.01" inputmode="decimal" onkeydown="if(event.key==='Enter')doSave()"/>
    </div>

    <div class="cat-grid" id="catGrid"></div>

    <div class="note-row">
      <div class="note-wrap">
        <input type="text" id="noteInp" class="note-inp" placeholder="Opomba / podkategorija (npr. televizija)"
          oninput="onNoteInput()" onblur="setTimeout(()=>hideNoteSugg(),200)"
          onkeydown="if(event.key==='Enter')doSave()"/>
        <div class="note-sugg" id="noteSugg"></div>
      </div>
    </div>

    <button class="save-btn exp" id="saveBtn" onclick="doSave()">Dodaj strošek</button>
  </div>

  <!-- chart — dropdown -->
  <div class="chart-card" style="padding:0">
    <button class="acc-hdr" onclick="togAcc('chart')">
      <span>Mesečni pregled</span>
      <span id="chev-chart">▼</span>
    </button>
    <div id="body-chart" style="display:none;padding:0 16px 16px">
      <div class="chart-wrap"><canvas id="mainChart"></canvas></div>
    </div>
  </div>

  <!-- recurring — dropdown -->
  <div class="rec-card" style="padding:0">
    <button class="acc-hdr" onclick="togAcc('rec')">
      <span>Ponavljajoči stroški <span id="recBadge"></span></span>
      <span id="chev-rec">▼</span>
    </button>
    <div id="body-rec" style="display:none;padding:0 16px 16px">
      <div class="rec-list" id="recList"></div>
      <div class="rec-add-row">
        <input type="text" class="rec-inp" id="recName" placeholder="Naziv (npr. Netflix)"/>
        <input type="number" class="rec-inp" id="recAmt" placeholder="€" step="0.01" inputmode="decimal"/>
      </div>
      <div class="rec-cat-row" id="recCatRow"></div>
      <button class="rec-save-btn" onclick="addRecurring()">+ Dodaj ponavljajoči strošek</button>
      <div class="rec-total" id="recTotal" style="display:none">
        <div class="rec-total-lbl">Skupaj mesečno</div>
        <div class="rec-total-amt" id="recTotalAmt"></div>
      </div>
    </div>
  </div>

  <!-- edit recurring modal -->
  <div id="editOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:50;align-items:flex-end;justify-content:center">
    <div style="background:#161b22;border:1px solid #30363d;border-radius:16px 16px 0 0;padding:20px 16px calc(env(safe-area-inset-bottom,0px)+20px);width:100%;max-width:500px">
      <div style="font-size:15px;font-weight:600;margin-bottom:14px">Uredi ponavljajoči strošek</div>
      <div style="font-size:11px;color:#8b949e;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">Naziv</div>
      <input type="text" class="rec-inp" id="editName" style="margin-bottom:10px"/>
      <div style="font-size:11px;color:#8b949e;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">Znesek (€)</div>
      <input type="number" class="rec-inp" id="editAmt" step="0.01" inputmode="decimal" style="margin-bottom:10px"/>
      <div style="font-size:11px;color:#8b949e;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">Kategorija</div>
      <div class="rec-cat-row" id="editCatRow" style="margin-bottom:14px"></div>
      <div style="display:flex;gap:8px">
        <button onclick="closeEdit()" style="flex:1;background:none;border:1px solid #30363d;border-radius:8px;color:#8b949e;padding:11px;font-size:14px;cursor:pointer">Prekliči</button>
        <button onclick="saveEdit()" style="flex:2;background:#f85149;color:#fff;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:700;cursor:pointer">Shrani spremembe</button>
      </div>
    </div>
  </div>

  <!-- budget — dropdown -->
  <div class="budget-card" style="padding:0">
    <button class="acc-hdr" onclick="togAcc('budget')">
      <span>Mesečni budget</span>
      <span id="chev-budget">▼</span>
    </button>
    <div id="body-budget" style="display:none;padding:0 16px 16px">
      <div class="budget-row">
        <div class="budget-lbl">Limit stroškov</div>
        <input type="number" class="budget-inp" id="budgetInp" placeholder="npr. 1500"
          inputmode="decimal" oninput="saveBudget()"/>
        <div style="font-size:13px;color:#8b949e">€</div>
      </div>
      <div class="budget-bar-wrap" id="budgetBarWrap" style="display:none">
        <div class="budget-bar-bg"><div class="budget-bar" id="budgetBar"></div></div>
        <div class="budget-info">
          <span id="budgetLeft"></span>
          <span id="budgetPct"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- backup — dropdown -->
  <div class="budget-card" style="padding:0;margin-bottom:14px">
    <button class="acc-hdr" onclick="togAcc('backup')">
      <span>Varnostna kopija</span>
      <span id="chev-backup">▼</span>
    </button>
    <div id="body-backup" style="display:none;padding:0 16px 16px">
      <div style="font-size:12px;color:#8b949e;margin-bottom:12px;line-height:1.6">
        Izvozi vse podatke kot JSON datoteko. Na novi napravi uvozi isto datoteko in vse transakcije, ponavljajoči stroški in budget se obnovijo.
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button onclick="exportData()" style="flex:1;background:#3fb950;color:#000;border:none;border-radius:8px;padding:10px 14px;font-size:13px;font-weight:700;cursor:pointer">📦 Izvozi JSON</button>
        <button onclick="document.getElementById('importFile').click()" style="flex:1;background:#161b22;color:#e6edf3;border:1px solid #30363d;border-radius:8px;padding:10px 14px;font-size:13px;font-weight:600;cursor:pointer">📥 Uvozi JSON</button>
      </div>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(this)"/>
      <div style="margin-top:10px;font-size:11px;color:#484f58" id="backupInfo"></div>
    </div>
  </div>

  <!-- tabs -->
  <div class="tabs">
    <button class="tab-btn active" id="tab-cats" onclick="setTab('cats')">Po kategorijah</button>
    <button class="tab-btn" id="tab-txs" onclick="setTab('txs')">Transakcije</button>
  </div>

  <div id="view-cats"></div>
  <div id="view-txs" style="display:none"></div>

</div>
<div class="toast" id="toastEl"></div>

<script>
// ── categories ───────────────────────────────────────────────────
const EXP_CATS=[
  {id:'food',    e:'🛒',n:'Hrana',     c:'#3fb950'},
  {id:'resto',   e:'🍽',n:'Restavracija',c:'#f0883e'},
  {id:'trans',   e:'🚗',n:'Prevoz',    c:'#58a6ff'},
  {id:'home',    e:'🏠',n:'Dom',       c:'#bc8cff'},
  {id:'health',  e:'💊',n:'Zdravje',   c:'#ff7b72'},
  {id:'fun',     e:'🎮',n:'Prosti čas',c:'#e3b341'},
  {id:'clothes', e:'👕',n:'Oblačila',  c:'#79c0ff'},
  {id:'insurance',e:'🛡',n:'Zavarovanja',c:'#79c0ff'},
  {id:'kids',    e:'👶',n:'Otroci',    c:'#f0883e'},
  {id:'vacation',e:'✈️',n:'Dopust',    c:'#58a6ff'},
  {id:'other',   e:'📦',n:'Ostalo',    c:'#484f58'},
];
const INC_CATS=[
  {id:'salary',  e:'💼',n:'Plača',     c:'#3fb950'},
  {id:'freelance',e:'💻',n:'Freelance',c:'#58a6ff'},
  {id:'gift',    e:'🎁',n:'Darilo',    c:'#e3b341'},
  {id:'invest',  e:'📈',n:'Naložbe',   c:'#bc8cff'},
  {id:'refund',  e:'↩️',n:'Povračilo', c:'#79c0ff'},
  {id:'other_i', e:'💰',n:'Ostalo',    c:'#484f58'},
];

// ── state ────────────────────────────────────────────────────────
const K={txs:'fin3_txs',budget:'fin3_budget',rec:'fin3_rec'};
function lg(k,d){try{const v=localStorage.getItem(k);return v!=null?JSON.parse(v):d;}catch{return d;}}
function ls(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

let txs      = lg(K.txs,[]);
let budget   = lg(K.budget, {limit:''});
let recurring= lg(K.rec, []);
let curType  = 'exp';
let selCat   = 'food';
let recSelCat= 'home';
let viewTab  = 'cats';
let chartInst= null;
let monthOffset=0;

function getMonthRange(offset){
  const now=new Date();
  const y=now.getFullYear(), m=now.getMonth()+offset;
  const start=new Date(y,m,1);
  const end=new Date(y,m+1,0,23,59,59,999);
  return{start,end,y:start.getFullYear(),m:start.getMonth()};
}
function monthLabel(offset){
  const{y,m}=getMonthRange(offset);
  const names=['Januar','Februar','Marec','April','Maj','Junij','Julij','Avgust','September','Oktober','November','December'];
  const now=new Date();
  if(offset===0&&y===now.getFullYear()) return 'Ta mesec';
  if(offset===-1&&y===now.getFullYear()) return 'Prejšnji';
  return `${names[m]} ${y}`;
}
function changeMonth(d){
  if(monthOffset+d>0) return; // can't go into future
  monthOffset+=d;
  renderAll();
}

function monthTxs(){
  const{start,end,y,m}=getMonthRange(monthOffset);
  const manual=txs.filter(t=>{const d=new Date(t.iso);return d>=start&&d<=end;});
  // inject recurring as virtual transactions on day 1 of the month
  const recVirtual=recurring.map(r=>({
    id:'rec_'+r.id+'_'+y+'_'+m,
    type:'exp', amt:r.amt,
    cat:r.cat, catName:r.catName, catEmoji:r.catEmoji, catColor:r.catColor,
    note:r.name, iso:new Date(y,m,1,8,0,0).toISOString(),
    dateStr:new Date(y,m,1).toLocaleDateString('sl-SI'),
    isRecurring:true
  }));
  return [...manual,...recVirtual];
}

let recSelCatSet = false;

function renderRecCatRow(){
  document.getElementById('recCatRow').innerHTML=EXP_CATS.map(c=>

function addRecurring(){
  const name=document.getElementById('recName').value.trim();
  const amt=parseFloat(document.getElementById('recAmt').value);
  if(!name){toast('Vnesi naziv','err');return;}
  if(!amt||amt<=0){toast('Vnesi znesek','err');return;}
  const cat=EXP_CATS.find(c=>c.id===recSelCat)||EXP_CATS[0];
  recurring.push({id:Date.now(),name,amt:Math.round(amt*100)/100,
    cat:cat.id,catName:cat.n,catEmoji:cat.e,catColor:cat.c});
  ls(K.rec,recurring);
  document.getElementById('recName').value='';

}

let editSelCat='home';

// ── note autocomplete (subcategory suggestions) ───────────────────
function onNoteInput(){
  const q=document.getElementById('noteInp').value.trim().toLowerCase();
  const sugg=document.getElementById('noteSugg');
  if(!q){sugg.classList.remove('show');return;}
  // collect all past notes for current category
  const past=txs
    .filter(t=>t.cat===selCat&&t.note&&t.note.toLowerCase().includes(q))
    .map(t=>t.note);
  const unique=[...new Set(past)].slice(0,5);
  if(!unique.length){sugg.classList.remove('show');return;}
  sugg.innerHTML=unique.map(n=>
    `<div class="note-sugg-item" onclick="pickNote('${n.replace(/'/g,"\\'")}')">
      ${n}<span>${EXP_CATS.find(c=>c.id===selCat)?.n||''}</span>
    </div>`
  ).join('');
  sugg.classList.add('show');
}
function pickNote(val){
  document.getElementById('noteInp').value=val;
  hideNoteSugg();
}
function hideNoteSugg(){
  document.getElementById('noteSugg').classList.remove('show');
}

// ── save transaction ─────────────────────────────────────────────
function doSave(){
  const amt=parseFloat(document.getElementById('amountInp').value);
  if(!amt||amt<=0){toast('Vnesi znesek','err');return;}
  const note=document.getElementById('noteInp').value.trim();
  const cats=curType==='exp'?EXP_CATS:INC_CATS;
  const cat=cats.find(c=>c.id===selCat)||cats[cats.length-1];
  const now=new Date();

  txs.unshift({
    id:Date.now(),
    type:curType,
    amt:Math.round(amt*100)/100,
    cat:selCat,
    catName:cat.n,
    catEmoji:cat.e,
    catColor:cat.c,
    note,
    iso:now.toISOString(),
    dateStr:now.toLocaleDateString('sl-SI')
  });
  ls(K.txs,txs);

  document.getElementById('amountInp').value='';
  document.getElementById('noteInp').value='';

  renderAll();

  const sign=curType==='exp'?'−':'+'
  toast(`${sign}€${amt.toFixed(2)} · ${cat.n}`);

  // budget warning
  if(curType==='exp'&&budget.limit){
    const mt=monthTxs();
    const totalExp=mt.filter(t=>t.type==='exp').reduce((s,t)=>s+t.amt,0);
    const lim=parseFloat(budget.limit);
    if(totalExp>lim) toast(`⚠️ Prekoračen budget! (€${totalExp.toFixed(0)} / €${lim.toFixed(0)})`, 'err');
    else if(totalExp>lim*0.9) toast(`Budget skoraj porabljen (${Math.round(totalExp/lim*100)}%)`, 'info');
  }
}

function renderBudget(){
  const inp=document.getElementById('budgetInp');
  if(inp&&!inp.value&&budget.limit) inp.value=budget.limit;
  const lim=parseFloat(budget.limit)||0;
  const mt=monthTxs();
  const totalExp=mt.filter(t=>t.type==='exp').reduce((s,t)=>s+t.amt,0);
  const wrap=document.getElementById('budgetBarWrap');
  if(!lim||!wrap){if(wrap)wrap.style.display='none';return;}
  wrap.style.display='block';
  const pct=Math.min(100,Math.round(totalExp/lim*100));
  const bar=document.getElementById('budgetBar');
  bar.style.width=pct+'%';
  bar.style.background=pct>=100?'#f85149':pct>=80?'#e3b341':'#3fb950';
  document.getElementById('budgetLeft').textContent=`€${totalExp.toFixed(2)} porabljeno`;
  document.getElementById('budgetPct').textContent=`${pct}% / €${lim.toFixed(0)}`;

  // also update balance card progress
  const bp=document.getElementById('budgetProgress');
  bp.innerHTML=`<div style="margin-top:2px">
    <div style="height:4px;background:#0d1117;border-radius:2px;overflow:hidden;border:1px solid #21262d">
      <div style="height:100%;width:${pct}%;background:${pct>=100?'#f85149':pct>=80?'#e3b341':'#3fb950'};border-radius:2px;transition:width .4s"></div>
    </div>
    <div style="font-size:11px;color:#8b949e;margin-top:4px;text-align:right;font-family:ui-monospace,monospace">Budget: €${totalExp.toFixed(0)} / €${lim.toFixed(0)}</div>
  </div>`;
}

function renderBalance(){
  const mt=monthTxs();
  const inc=mt.filter(t=>t.type==='inc').reduce((s,t)=>s+t.amt,0);
  const exp=mt.filter(t=>t.type==='exp').reduce((s,t)=>s+t.amt,0);

  document.getElementById('balInc').textContent=`€${inc.toFixed(2)}`;

// ── chart ─────────────────────────────────────────────────────────
function renderChart(){
  const canvas=document.getElementById('mainChart');
  if(!canvas)return;
  if(chartInst){chartInst.destroy();chartInst=null;}

  const{start,y,m}=getMonthRange(monthOffset);
  const daysInMonth=new Date(y,m+1,0).getDate();
  const labels=[],expData=[],incData=[];

  for(let d=1;d<=daysInMonth;d++){
    const dayStart=new Date(y,m,d);
    const dayEnd=new Date(y,m,d,23,59,59,999);
    const dayTxs=txs.filter(t=>{const dt=new Date(t.iso);return dt>=dayStart&&dt<=dayEnd;});
    labels.push(d);
    expData.push(dayTxs.filter(t=>t.type==='exp').reduce((s,t)=>s+t.amt,0)||null);
    incData.push(dayTxs.filter(t=>t.type==='inc').reduce((s,t)=>s+t.amt,0)||null);
  }

  chartInst=new Chart(canvas.getContext('2d'),{
    type:'bar',
    data:{
      labels,
      datasets:[
        {label:'Stroški',data:expData,backgroundColor:'rgba(248,81,73,.7)',borderRadius:4,borderSkipped:false},
        {label:'Prihodki',data:incData,backgroundColor:'rgba(63,185,80,.7)',borderRadius:4,borderSkipped:false}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,animation:false,
      plugins:{legend:{labels:{color:'#8b949e',boxWidth:10,font:{size:11}}},
        tooltip:{backgroundColor:'#161b22',borderColor:'#30363d',borderWidth:1,
          titleColor:'#8b949e',bodyColor:'#e6edf3',callbacks:{
            label:ctx=>`€${ctx.parsed.y?.toFixed(2)||0}`
          }}},
      scales:{
        x:{grid:{color:'rgba(48,54,61,.4)'},ticks:{color:'#8b949e',font:{size:9},maxTicksLimit:10}},
        y:{grid:{color:'rgba(48,54,61,.4)'},ticks:{color:'#8b949e',font:{size:10},
          callback:v=>'€'+v}}
      }
    }
  });
}

// ── category breakdown ────────────────────────────────────────────
const catOpen={};
function toggleSubcat(catId){
  catOpen[catId]=!catOpen[catId];
  const el=document.getElementById('subcat-'+catId);
  const btn=document.getElementById('expand-'+catId);
  if(el){el.classList.toggle('open',catOpen[catId]);}
  if(btn){btn.textContent=catOpen[catId]?'▲ skrij podkategorije':'▼ pokaži podkategorije';}
}

function renderCats(){
  const el=document.getElementById('view-cats');
  const mt=monthTxs();
  const expTxs=mt.filter(t=>t.type==='exp');
  const totalExp=expTxs.reduce((s,t)=>s+t.amt,0);

  if(!expTxs.length){
    el.innerHTML=`<div class="empty"><div class="empty-icon">📊</div><p>Ni stroškov ta mesec.</p></div>`;
    return;
  }

  // group by category
  const byCat={};
  for(const t of expTxs){
    if(!byCat[t.cat]) byCat[t.cat]={cat:t,amt:0,count:0,subs:{}};
    byCat[t.cat].amt+=t.amt;
    byCat[t.cat].count++;
    // subcategory = note if it exists, else "(brez opombe)"
    const subKey=t.note&&t.note.trim() ? t.note.trim() : null;
    if(subKey){
      if(!byCat[t.cat].subs[subKey]) byCat[t.cat].subs[subKey]={amt:0,count:0};
      byCat[t.cat].subs[subKey].amt+=t.amt;
      byCat[t.cat].subs[subKey].count++;
    }
  }
  const sorted=Object.values(byCat).sort((a,b)=>b.amt-a.amt);

  el.innerHTML=`<div class="cat-breakdown">`+sorted.map(({cat:t,amt,count,subs})=>{
    const pct=totalExp>0?Math.round(amt/totalExp*100):0;
    const subEntries=Object.entries(subs).sort((a,b)=>b[1].amt-a[1].amt);
    const hasSubcats=subEntries.length>0;

    const subcatHtml=hasSubcats ? `
      <button class="expand-btn" id="expand-${t.cat}" onclick="toggleSubcat('${t.cat}')">
        ▼ pokaži podkategorije (${subEntries.length})
      </button>
      <div class="subcat-list${catOpen[t.cat]?' open':''}" id="subcat-${t.cat}">
        ${subEntries.map(([name,s])=>{
          const subPct=amt>0?Math.round(s.amt/amt*100):0;
          return `<div class="subcat-row">
            <div class="subcat-row-name">
              <span>→</span>
              <span>${name}</span>
              <span style="color:#484f58">${s.count}×</span>
            </div>
            <span style="font-family:ui-monospace,monospace;color:${t.catColor}">€${s.amt.toFixed(2)}</span>
          </div>
          <div class="subcat-bar-bg">
            <div class="subcat-bar" style="width:${subPct}%;background:${t.catColor}88"></div>
          </div>`;
        }).join('')}
      </div>` : '';

    return `<div class="cat-row">
      <div class="cat-row-top">
        <div class="cat-row-left">
          <span class="cat-row-emoji">${t.catEmoji}</span>
          <span class="cat-row-name">${t.catName}</span>
        </div>
        <span class="cat-row-amt" style="color:${t.catColor}">€${amt.toFixed(2)}</span>
      </div>
      <div class="cat-bar-bg"><div class="cat-bar" style="width:${pct}%;background:${t.catColor}"></div></div>
      <div class="cat-row-count">${count} transakcij · ${pct}%</div>
      ${subcatHtml}
    </div>`;
  }).join('')+'</div>';
}

// ── transactions list ─────────────────────────────────────────────
function renderTxs(){
  const el=document.getElementById('view-txs');
  const mt=monthTxs();
  if(!mt.length){
    el.innerHTML=`<div class="empty"><div class="empty-icon">💸</div><p>Ni transakcij ta mesec.</p></div>`;
    return;
  }

  // group by date
  const byDate={};
  for(const t of mt)(byDate[t.dateStr]=byDate[t.dateStr]||[]).push(t);

  let html='';
  for(const[date,dts] of Object.entries(byDate)){
    const dayTotal=dts.reduce((s,t)=>s+(t.type==='exp'?-t.amt:t.amt),0);
    html+=`<div class="tx-date-sep">${date}
      <span style="float:right;color:${dayTotal>=0?'#3fb950':'#f85149'}">${dayTotal>=0?'+':''}€${dayTotal.toFixed(2)}</span>
    </div>`;
    for(const t of dts){
      const isExp=t.type==='exp';
      html+=`<div class="tx-item">
        <div class="tx-icon" style="background:${t.catColor}22">${t.catEmoji}</div>
        <div class="tx-body">
          <div class="tx-name">${t.note||t.catName}</div>
          <div class="tx-meta">${t.catName} · ${new Date(t.iso).toLocaleTimeString('sl-SI',{hour:'2-digit',minute:'2-digit'})}</div>
        </div>
        <div class="tx-amt" style="color:${isExp?'#f85149':'#3fb950'}">${isExp?'−':'+'}€${t.amt.toFixed(2)}</div>
        <button class="tx-del" onclick="delTx(${t.id})">×</button>
      </div>`;
    }
  }
  el.innerHTML=html;
}

// ── backup / restore ─────────────────────────────────────────────
function exportData(){
  const data={txs,recurring,budget,exportedAt:new Date().toISOString(),version:1};
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));
  a.download=`finance-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  document.getElementById('backupInfo').textContent=`Zadnji izvoz: ${new Date().toLocaleString('sl-SI')}`;
  toast('Podatki izvoženi 📦','ok');
}
function importData(input){
  const f=input.files[0];if(!f)return;
  const fr=new FileReader();
  fr.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(!d.version||!Array.isArray(d.txs)) throw new Error('Napačen format');
      if(!confirm(`Uvoziti ${d.txs.length} transakcij in ${(d.recurring||[]).length} ponavljajočih stroškov?\n\nObstoječi podatki se bodo ohranili, dodane bodo le nove transakcije.`)) return;
      // merge transactions
      const exIds=new Set(txs.map(t=>t.id));
      const newTxs=d.txs.filter(t=>!exIds.has(t.id));
      txs=[...txs,...newTxs].sort((a,b)=>new Date(b.iso)-new Date(a.iso));
      ls(K.txs,txs);
      // overwrite recurring & budget if present
      if(d.recurring){recurring=d.recurring;ls(K.rec,recurring);}
      if(d.budget){budget=d.budget;ls(K.budget,budget);
        const bi=document.getElementById('budgetInp');if(bi)bi.value=budget.limit||'';}
      renderRecurring();renderAll();
      document.getElementById('backupInfo').textContent=`Uvoženih ${newTxs.length} novih transakcij · ${new Date().toLocaleString('sl-SI')}`;
      toast(`Uvoženih ${newTxs.length} transakcij`,'ok');
    }catch(err){toast('Napaka pri uvozu: '+err.message,'err');}
    input.value='';
  };
  fr.readAsText(f);
}

// ── master render ─────────────────────────────────────────────────
function renderAll(){
  renderBalance();
  renderBudget();
  if(accOpen['chart']) renderChart();
  if(viewTab==='cats')renderCats();else renderTxs();
}

// ── init ─────────────────────────────────────────────────────────
renderCatGrid();
renderRecurring();
initAcc();
if(budget.limit) document.getElementById('budgetInp').value=budget.limit;
renderBalance();
renderBudget();
if(accOpen['chart']) renderChart();
if(viewTab==='cats')renderCats();else renderTxs();
</script>
</body>

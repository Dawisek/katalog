<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Seznam Barov</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --card: #22263a;
    --accent: #5b8dee;
    --accent2: #a78bfa;
    --text: #e8eaf0;
    --muted: #7a7f9a;
    --border: #2e3248;
    --phone: #34d399;
    --maps: #fb923c;
    --radius: 14px;
    --shadow: 0 2px 12px rgba(0,0,0,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
    padding-bottom: 40px;
  }

  /* HEADER */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(15,17,23,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px 10px;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 10px;
  }
  .header .stats {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 10px;
  }

  /* SEARCH */
  .search-wrap {
    position: relative;
  }
  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 16px;
    pointer-events: none;
  }
  #search {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px 10px 36px;
    color: var(--text);
    font-size: 15px;
    outline: none;
    -webkit-appearance: none;
    appearance: none;
    transition: border-color 0.2s;
  }
  #search::placeholder { color: var(--muted); }
  #search:focus { border-color: var(--accent); }

  /* CITY FILTER PILLS */
  .cities-scroll {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding: 12px 16px 0;
    display: flex;
    gap: 8px;
    white-space: nowrap;
  }
  .cities-scroll::-webkit-scrollbar { display: none; }
  .city-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 13px;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.18s;
    user-select: none;
    -webkit-user-select: none;
    flex-shrink: 0;
  }
  .city-pill.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
  }
  .city-pill .cnt {
    font-size: 11px;
    opacity: 0.7;
  }

  /* MAIN CONTENT */
  .content {
    padding: 16px 16px 0;
  }

  /* NO RESULTS */
  .no-results {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .no-results .icon { font-size: 48px; margin-bottom: 12px; }
  .no-results p { font-size: 16px; }

  /* CITY SECTION */
  .city-section { margin-bottom: 24px; }
  .city-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
  }
  .city-name {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    flex: 1;
  }
  .city-count {
    background: var(--accent);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    border-radius: 10px;
    padding: 2px 8px;
    min-width: 24px;
    text-align: center;
  }
  .city-chevron {
    color: var(--muted);
    font-size: 14px;
    transition: transform 0.22s;
  }
  .city-section.collapsed .city-chevron { transform: rotate(-90deg); }
  .city-bars {
    display: flex;
    flex-direction: column;
    gap: 8px;
    overflow: hidden;
    transition: max-height 0.3s ease;
  }
  .city-section.collapsed .city-bars { max-height: 0 !important; }

  /* BAR CARD */
  .bar-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 13px 14px;
    display: flex;
    flex-direction: column;
    gap: 5px;
    transition: border-color 0.15s, transform 0.1s;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  .bar-card:active { transform: scale(0.985); border-color: var(--accent); }

  .bar-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }
  .bar-name mark {
    background: rgba(91,141,238,0.25);
    color: var(--accent);
    border-radius: 3px;
    padding: 0 1px;
  }

  .bar-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 2px;
  }

  .btn-maps {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(251,146,60,0.12);
    border: 1px solid rgba(251,146,60,0.3);
    border-radius: 8px;
    padding: 6px 11px;
    font-size: 13px;
    color: var(--maps);
    font-weight: 500;
    text-decoration: none;
    cursor: pointer;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
  }
  .btn-maps:active { background: rgba(251,146,60,0.25); }

  .btn-phone {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(52,211,153,0.1);
    border: 1px solid rgba(52,211,153,0.25);
    border-radius: 8px;
    padding: 6px 11px;
    font-size: 13px;
    color: var(--phone);
    font-weight: 500;
    text-decoration: none;
    cursor: pointer;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
  }
  .btn-phone:active { background: rgba(52,211,153,0.2); }

  .bar-address {
    font-size: 12px;
    color: var(--muted);
    margin-top: 1px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>📍 Seznam Barov</h1>
  <div class="stats" id="stats"></div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="search" id="search" placeholder="Iskanje po imenu ali mestu..." autocomplete="off" autocorrect="off" spellcheck="false">
  </div>
</div>

<div class="cities-scroll" id="cityPills"></div>
<div class="content" id="content"></div>

const totalBars = Object.values(BARS_DATA).reduce((s, a) => s + a.length, 0);
const cities = Object.keys(BARS_DATA);

let activeCity = null;
let searchTerm = '';
let sectionHeights = {};

function mapsUrl(bar) {
  const q = encodeURIComponent([bar.name, bar.street, bar.city, 'Slovenija'].filter(Boolean).join(', '));
  return `https://maps.google.com/maps?q=${q}`;
}

function formatPhone(raw) {
  return raw.replace(/\s*\(386(\d+)\)/, (_, n) => ' 0' + n);
}

function highlight(text, term) {
  if (!term) return escHtml(text);
  const re = new RegExp('(' + term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  return escHtml(text).replace(re, '<mark>$1</mark>');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function buildPills() {
  const wrap = document.getElementById('cityPills');
  wrap.innerHTML = '';
  const all = document.createElement('div');
  all.className = 'city-pill' + (activeCity === null ? ' active' : '');
  all.textContent = 'Vsa mesta';
  all.onclick = () => { activeCity = null; buildPills(); renderContent(); };
  wrap.appendChild(all);

  cities.forEach(city => {
    const pill = document.createElement('div');
    pill.className = 'city-pill' + (activeCity === city ? ' active' : '');
    const cnt = BARS_DATA[city].length;
    pill.innerHTML = escHtml(city) + ' <span class="cnt">' + cnt + '</span>';
    pill.onclick = () => {
      activeCity = activeCity === city ? null : city;
      buildPills();
      renderContent();
    };
    wrap.appendChild(pill);
  });
}

function renderContent() {
  const content = document.getElementById('content');
  const term = searchTerm.toLowerCase().trim();
  const citiesToShow = activeCity ? [activeCity] : cities;
  let totalVisible = 0;
  let html = '';

  citiesToShow.forEach(city => {
    let bars = BARS_DATA[city];
    if (term) {
      bars = bars.filter(b =>
        b.name.toLowerCase().includes(term) ||
        b.city.toLowerCase().includes(term) ||
        b.street.toLowerCase().includes(term)
      );
    }
    if (!bars.length) return;
    totalVisible += bars.length;

    html += `<div class="city-section" id="sec-${escHtml(city).replace(/\s/g,'_')}">`;
    html += `<div class="city-header" onclick="toggleCity('${escHtml(city).replace(/'/g,"\\'")}')">`;
    html += `<span class="city-name">${highlight(city, term)}</span>`;
    html += `<span class="city-count">${bars.length}</span>`;
    html += `<span class="city-chevron">▾</span>`;
    html += `</div>`;
    html += `<div class="city-bars">`;

    bars.forEach(bar => {
      const murl = mapsUrl(bar);
      const addrParts = [bar.street, bar.postal ? bar.postal + ' ' + bar.city : bar.city].filter(Boolean);
      const addr = addrParts.join(', ');

      html += `<div class="bar-card">`;
      html += `<div class="bar-name">${highlight(bar.name, term)}</div>`;
      html += `<div class="bar-actions">`;
      html += `<a class="btn-maps" href="${murl}" target="_blank" rel="noopener">🗺 Odpri v Maps</a>`;
      if (bar.phone) {
        const clean = formatPhone(bar.phone);
        const tel = 'tel:' + bar.phone.replace(/[^+\d]/g, '');
        html += `<a class="btn-phone" href="${tel}">📞 ${escHtml(clean)}</a>`;
      }
      html += `</div>`;
      if (addr) html += `<div class="bar-address">📍 ${escHtml(addr)}</div>`;
      html += `</div>`;
    });

    html += `</div></div>`;
  });

  if (!totalVisible) {
    html = `<div class="no-results"><div class="icon">🔍</div><p>Ni rezultatov za "<strong>${escHtml(term)}</strong>"</p></div>`;
  }

  content.innerHTML = html;

  // Set max-heights for animation
  document.querySelectorAll('.city-bars').forEach(el => {
    el.style.maxHeight = el.scrollHeight + 'px';
  });

  document.getElementById('stats').textContent =
    totalVisible + ' lokacij · ' + (activeCity ? 1 : citiesToShow.filter(c => {
      let b = BARS_DATA[c];
      if (term) b = b.filter(bar => bar.name.toLowerCase().includes(term) || bar.city.toLowerCase().includes(term) || bar.street.toLowerCase().includes(term));
      return b.length > 0;
    }).length) + ' mest';
}

function toggleCity(city) {
  const id = 'sec-' + city.replace(/\s/g,'_');
  const sec = document.getElementById(id);
  if (!sec) return;
  const bars = sec.querySelector('.city-bars');
  if (sec.classList.contains('collapsed')) {
    sec.classList.remove('collapsed');
    bars.style.maxHeight = bars.scrollHeight + 'px';
  } else {
    sec.classList.add('collapsed');
    bars.style.maxHeight = '0';
  }
}

document.getElementById('search').addEventListener('input', function() {
  searchTerm = this.value;
  activeCity = null;
  buildPills();
  renderContent();
});

// Init
document.getElementById('stats').textContent = totalBars + ' lokacij · ' + cities.length + ' mest';
buildPills();
renderContent();
</script>
